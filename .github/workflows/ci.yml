jobs:

  validate:
    name: 🔍 Validate Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: HTML validation
        run: |
          npm install -g htmlhint
          htmlhint "**/*.html"

      - name: Check broken links
        run: |
          npm install -g broken-link-checker
          blc http://localhost -ro || true

  build-check:
    name: 🏗️ Build Sanity Check
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate build
        run: |
          echo "No build step required for static site"
          ls -la

  deploy:
    name: 🚀 Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy (placeholder)
        run: echo "Deployment step will be added in next phase"

  ai-review:   # ✅ NOW INSIDE jobs
    name: 🤖 AI PR Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin main
          git diff origin/main > diff.txt

      - name: Trim diff
        run: head -c 5000 diff.txt > trimmed_diff.txt

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="You are a senior frontend engineer. Review HTML, CSS, JS for best practices, accessibility, SEO, and performance.

      Review this code diff:

      $(cat trimmed_diff.txt)"

          RESPONSE=$(curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$AIzaSyDfGchSmJElTqGrBEsFB0FS-T9V40eyaIk" \
            -s \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [
               {
                \"parts\": [
                 {
                  \"text\": \"$PROMPT\"
                 }
               ]
             }
           ]
         }")

      echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > review.txt




