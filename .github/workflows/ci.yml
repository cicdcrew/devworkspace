name: Production CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  validate:
    name: 🔍 Validate Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: HTML validation
        run: |
          npm install -g htmlhint
          htmlhint "**/*.html"

      - name: Check broken links
        run: |
          npm install -g broken-link-checker
          blc http://localhost -ro || true

  build-check:
    name: 🏗️ Build Sanity Check
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate build
        run: |
          echo "No build step required for static site"
          ls -la

  deploy:
    name: 🚀 Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy (placeholder)
        run: echo "Deployment step will be added in next phase"
ai-review:
  name: 🤖 AI PR Review
  runs-on: ubuntu-latest
  if: github.event_name == 'pull_request'

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get PR diff
      run: |
        git fetch origin main
        git diff origin/main > diff.txt

    - name: Trim diff (avoid token overflow)
      run: head -c 5000 diff.txt > trimmed_diff.txt

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Call OpenAI API
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
          -s \
          -H "Authorization: Bearer $OPENAI_API_KEY" \
          -H "Content-Type: application/json" \
          -d "{
            \"model\": \"gpt-4o-mini\",
            \"messages\": [
              {
                \"role\": \"system\",
                \"content\": \"You are a senior frontend engineer. Review HTML, CSS, JS for best practices, accessibility, SEO, and performance. Keep response concise.\"
              },
              {
                \"role\": \"user\",
                \"content\": \"Review this code diff:\\n\\n$(cat trimmed_diff.txt)\"
              }
            ]
          }")

        echo "$RESPONSE" | jq -r '.choices[0].message.content' > review.txt

    - name: Post comment on PR
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const review = fs.readFileSync('review.txt', 'utf8');

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: "## 🤖 AI Code Review\n\n" + review
          });
