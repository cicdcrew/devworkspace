name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:

  validate:
    name: Validate Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTML validation
        run: htmlhint "**/*.html"

      - name: Start local server
        run: |
          npm install -g http-server
          http-server . -p 8080 &
          sleep 5

      - name: Check broken links
        run: |
          npm install -g broken-link-checker
          blc http://localhost:8080 -ro

  build-check:
    name: Build Sanity Check
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate build
        run: |
          echo "Static site - no build required"
          ls -la

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy (placeholder)
        run: echo "Deployment step will be added later"

  ai-review:
    name: AI PR Review (Gemini)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch main branch
        run: git fetch origin main

      - name: Get PR diff
        run: git diff origin/main > diff.txt

      - name: Trim diff
        run: head -c 4000 diff.txt > trimmed_diff.txt

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="You are a senior frontend engineer. Review HTML, CSS, JS for best practices, accessibility, SEO, and performance.

      Review this code diff:

      $(cat trimmed_diff.txt)"

          RESPONSE=$(curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$AIzaSyDfGchSmJElTqGrBEsFB0FS-T9V40eyaIk" \
            -s \
            -H "Content-Type: application/json" \
            -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=$GEMINI_API_KEY" \
            -d "{
              \"contents\": [
               {
                \"parts\": [
                 {
                  \"text\": \"$PROMPT\"
                 }
               ]
             }
           ]
         }")

      echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > review.txt




